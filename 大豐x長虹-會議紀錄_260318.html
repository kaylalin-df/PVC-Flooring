<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大豐 x 長虹 會議紀錄 2026/03/18</title>
<style>
  :root {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --surface2: #f8fafc;
    --border: #e2e8f0;
    --text: #1e293b;
    --text2: #475569;
    --text3: #94a3b8;
    --pri: #2563eb;
    --pri2: #1d4ed8;
    --ok: #16a34a;
    --ok-dim: #bbf7d0;
    --warn: #d97706;
    --warn-dim: #fde68a;
    --red: #dc2626;
    --accent1: #2563eb;
    --accent2: #7c3aed;
    --accent3: #0891b2;
    --accent4: #059669;
    --accent5: #d97706;
    --accent6: #db2777;
    --accent7: #4f46e5;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Microsoft JhengHei", "PingFang TC", -apple-system, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
    overflow-x: hidden;
  }

  /* ---- Header ---- */
  .header {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .header-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
  }
  .header h1 {
    font-size: 26px; font-weight: 800; letter-spacing: .5px;
    background: linear-gradient(90deg, #2563eb, #7c3aed);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .header .meeting-info { font-size: 13px; color: var(--text2); margin-top: 8px; }
  .header .meeting-info strong { color: var(--text); }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .header-actions button {
    padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 13px;
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .header-actions button:hover { background: var(--surface2); border-color: var(--text3); }
  .header-actions button.primary {
    background: var(--pri); border-color: var(--pri); font-weight: 600;
  }
  .header-actions button.primary:hover { background: var(--pri2); }

  /* ---- Stats Row ---- */
  .stats-row {
    display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap;
  }
  .stat-card {
    flex: 1; min-width: 140px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .stat-card .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .stat-value { font-size: 28px; font-weight: 800; margin-top: 2px; }
  .stat-card .stat-bar { height: 4px; background: var(--surface2); border-radius: 99px; margin-top: 8px; overflow: hidden; }
  .stat-card .stat-bar-fill { height: 100%; border-radius: 99px; transition: width .4s; }

  /* ---- Main ---- */
  .main { padding: 24px 40px 80px; }

  /* ---- Topic Card ---- */
  .topic {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 16px; overflow: hidden; transition: border-color .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .topic:hover { border-color: #cbd5e1; }
  .topic.all-done { border-color: var(--ok); border-left: 3px solid var(--ok); }

  .topic-header {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 24px; cursor: pointer; user-select: none;
    transition: background .15s;
  }
  .topic-header:hover { background: var(--surface2); }

  .topic-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: #fff; flex-shrink: 0;
  }
  .topic-title-area { flex: 1; }
  .topic-title { font-size: 17px; font-weight: 700; }
  .topic-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .topic-time {
    font-size: 11px; font-weight: 600; color: var(--pri);
    background: #dbeafe; border-radius: 4px; padding: 2px 8px;
    margin-left: 8px;
  }
  .topic-progress {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .topic-progress .tp-ring {
    width: 38px; height: 38px; position: relative;
  }
  .tp-ring svg { transform: rotate(-90deg); }
  .tp-ring .ring-text {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .topic-chevron {
    color: var(--text3); transition: transform .2s; flex-shrink: 0;
  }
  .topic.collapsed .topic-chevron { transform: rotate(-90deg); }
  .topic.collapsed .topic-body { display: none; }

  .topic-body { border-top: 1px solid var(--border); }

  /* ---- Status bar ---- */
  .topic-status-bar {
    display: flex; gap: 6px; padding: 12px 24px 0;
  }
  .tsb {
    font-size: 11px; padding: 4px 14px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent; color: var(--text2);
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .tsb:hover { border-color: var(--text3); color: var(--text); }
  .tsb.s-ok.on { background: var(--ok); color: #fff; border-color: var(--ok); }
  .tsb.s-pend.on { background: var(--warn); color: #fff; border-color: var(--warn); }
  .tsb.s-disc.on { background: var(--red); color: #fff; border-color: var(--red); }

  /* ---- Group ---- */
  .group { padding: 8px 24px; }
  .group-label {
    font-size: 12px; font-weight: 700; color: var(--text2);
    padding: 6px 0 2px; border-bottom: 1px solid var(--border);
    margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px;
  }

  /* ---- Bullet Item ---- */
  .bullet {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--bg);
    transition: background .15s; border-radius: 6px;
  }
  .bullet:last-child { border-bottom: none; }
  .bullet:hover { background: var(--surface2); }
  .bullet.done { opacity: .5; }
  .bullet.done label { text-decoration: line-through; }

  .bullet input[type="checkbox"] {
    margin-top: 4px; width: 18px; height: 18px;
    accent-color: var(--ok); cursor: pointer; flex-shrink: 0;
  }
  .bullet label { cursor: pointer; flex: 1; font-size: 14px; line-height: 1.55; }
  .bullet .note-btn {
    flex-shrink: 0; margin-top: 2px;
    background: none; border: 1px solid var(--border); border-radius: 5px;
    color: var(--text3); font-size: 11px; padding: 2px 8px;
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .bullet .note-btn:hover { border-color: var(--text2); color: var(--text2); }
  .bullet .note-btn.has-note { border-color: var(--warn-dim); color: var(--warn); }

  /* ---- Inline Note ---- */
  .note-area { padding: 0 24px 0 52px; }
  .note-inline {
    display: none; margin-bottom: 8px;
  }
  .note-inline.show { display: block; }
  .note-inline textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 12px; font-size: 13px; font-family: inherit;
    resize: vertical; min-height: 48px; line-height: 1.5;
  }
  .note-inline textarea:focus { outline: none; border-color: var(--pri); }
  .note-display {
    margin-bottom: 8px; padding: 6px 12px;
    background: #fef3c7; border-left: 3px solid var(--warn);
    border-radius: 0 6px 6px 0; font-size: 13px; color: #92400e;
    white-space: pre-wrap;
  }

  /* ---- Topic Note ---- */
  .topic-note { padding: 0 24px 14px; }
  .tn-toggle {
    font-size: 12px; color: var(--pri); cursor: pointer;
    background: none; border: none; font-family: inherit;
  }
  .tn-toggle:hover { text-decoration: underline; }
  .tn-box { display: none; margin-top: 6px; }
  .tn-box.show { display: block; }
  .tn-box textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 14px; font-size: 13px; font-family: inherit;
    resize: vertical; min-height: 60px; line-height: 1.5;
  }
  .tn-box textarea:focus { outline: none; border-color: var(--pri); }
  .tn-preview {
    margin-top: 6px; padding: 8px 14px;
    background: #fef3c7; border-left: 3px solid var(--warn);
    border-radius: 0 6px 6px 0; font-size: 13px; color: #92400e;
    white-space: pre-wrap;
  }

  /* ---- Cert Table (T7) ---- */
  .cert-wrap { padding: 0 24px 12px; overflow-x: auto; }
  .cert-tbl {
    width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px;
  }
  .cert-tbl th {
    background: var(--surface2); padding: 8px 10px; text-align: left;
    font-weight: 700; color: var(--text2); border-bottom: 2px solid var(--border);
    white-space: nowrap; position: sticky; top: 0;
  }
  .cert-tbl td {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    color: var(--text2); line-height: 1.5; vertical-align: top;
  }
  .cert-tbl tr:hover td { background: var(--surface2); }
  .cert-tbl .star { color: var(--warn); }
  .cert-tbl .blocked td { color: var(--red); opacity: .7; }
  .cert-tbl .cert-name-col { font-weight: 700; color: var(--text); white-space: nowrap; }

  /* Cert decision */
  .cert-decisions { padding: 4px 24px 8px; }
  .cd-row {
    display: flex; align-items: center; gap: 10px; padding: 5px 0;
    border-bottom: 1px solid var(--bg);
  }
  .cd-row:last-child { border-bottom: none; }
  .cd-label { font-size: 13px; font-weight: 600; min-width: 150px; }
  .cd-btns { display: flex; gap: 4px; margin-left: auto; }
  .cd-btn {
    font-size: 11px; padding: 3px 12px; border-radius: 5px;
    border: 1px solid var(--border); background: transparent; color: var(--text3);
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .cd-btn:hover { border-color: var(--text2); }
  .cd-btn.go.on { background: var(--ok); color: #fff; border-color: var(--ok); }
  .cd-btn.hold.on { background: var(--warn); color: #fff; border-color: var(--warn); }
  .cd-btn.no.on { background: var(--red); color: #fff; border-color: var(--red); }

  /* Cert applicant selector in table */
  .ca-btns { display: flex; gap: 3px; }
  .ca-btn {
    font-size: 10px; padding: 2px 7px; border-radius: 4px;
    border: 1px solid var(--border); background: transparent; color: var(--text3);
    cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap;
  }
  .ca-btn:hover { border-color: var(--text2); }
  .ca-btn.on { font-weight: 700; }
  .ca-btn.ca-df.on { background: var(--pri); color: #fff; border-color: var(--pri); }
  .ca-btn.ca-ch.on { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .ca-btn.ca-both.on { background: var(--accent3); color: #fff; border-color: var(--accent3); }

  /* Alert box */
  .alert {
    margin: 8px 24px 10px; padding: 10px 16px; border-radius: 8px;
    font-size: 12px; line-height: 1.6;
  }
  .alert.a-red { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
  .alert.a-blue { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
  .alert strong { font-weight: 700; }

  /* ---- Export Modal ---- */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 999; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    width: 90%; max-width: 780px; max-height: 85vh; display: flex; flex-direction: column;
    box-shadow: 0 25px 50px rgba(0,0,0,.15);
  }
  .modal-header {
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h2 { font-size: 16px; font-weight: 700; }
  .modal-close {
    background: none; border: none; color: var(--text3); font-size: 22px;
    cursor: pointer; padding: 4px 8px; line-height: 1;
  }
  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .modal-body pre {
    font-family: "Microsoft JhengHei", monospace;
    font-size: 13px; line-height: 1.7; white-space: pre-wrap;
    color: var(--text2);
  }
  .modal-footer {
    padding: 14px 24px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .modal-footer button {
    padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 13px;
    cursor: pointer; font-family: inherit;
  }
  .modal-footer button.primary { background: var(--pri); border-color: var(--pri); }

  /* ---- Responsive ---- */
  @media (max-width: 768px) {
    .header { padding: 20px 16px 16px; }
    .main { padding: 16px; }
    .topic-header { padding: 14px 16px; }
    .group, .topic-status-bar, .topic-note, .cert-wrap, .cert-decisions, .alert { padding-left: 16px; padding-right: 16px; }
    .note-area { padding-left: 42px; padding-right: 16px; }
    .stat-card { min-width: 120px; }
    .header h1 { font-size: 20px; }
  }

  @media print {
    .header-actions, .tsb, .note-btn, .cd-btns, .ca-btns, .modal-overlay { display: none !important; }
    .topic-body { display: block !important; }
    .topic { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>大豐 x 長虹 ｜ 第一次外部會議紀錄</h1>
      <div class="subtitle">PVC 循環再生地板合作 — 會議紀錄 Dashboard</div>

<div class="main" id="app"></div>

<!-- Export Modal -->

  <div class="modal">

      <h2>會議報告預覽</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>

    <div class="modal-body"><pre id="reportContent"></pre></div>
    <div class="modal-footer">
      <button onclick="closeModal()">關閉</button>

      <button class="primary" onclick="downloadReport()">下載 .txt</button>
    </div>
  </div>
</div>

<script>
const SK = "changhong_meeting_record_260318";

const COLORS = ["#3b82f6","#8b5cf6","#06b6d4","#10b981","#f59e0b","#ec4899","#6366f1"];

const topics = [
  {
    id:"T1", title:"合作框架與雙方期待", sub:"經銷合約 / 專利 / 定位與目標", time:"25 min",
    groups:[
      { label:"經銷合約", items:[
        {id:"a1", text:"經銷範圍：全台獨家？排除特定通路（電商/標案）？長虹既有直客如何處理？"},
        {id:"a2", text:"合約年限、續約條件、最低銷售量承諾與未達標後果"},
        {id:"a3", text:"違約與終止條件、終止後庫存處理、競業限制期"},
      ]},
      { label:"專利共同申請", items:[
        {id:"a4", text:"申請範圍（配方/製程/回收應用）、歸屬、費用分攤、預計時程"},
      ]},
      { label:"雙方期待", items:[
        {id:"a5", text:"長虹為什麼選擇與大豐合作？對大豐的期待？"},
        {id:"a6", text:"長虹估計年市場規模？目前自己怎麼賣？有無其他通路在賣類似產品？"},
      ]},
    ]
  },
  {
    id:"T2", title:"價格與商務條件", sub:"牌價 / 折扣 / 付款 / 調價機制", time:"15 min",
    groups:[
      { label:null, items:[
        {id:"a7", text:"索取完整牌價表（所有花色/規格，當場取得）"},
        {id:"a8", text:"七五折是否含運、含稅？有無其他附加費用？"},
        {id:"a9", text:"階梯折扣：3,000 / 5,000 / 10,000 坪以上？年度返點？"},
        {id:"a10", text:"付款條件：月結天數、信用額度、預付折扣"},

  {

  {

      { label:"施工", items:[

function load(){
  try{
    const r=localStorage.getItem(SK);
    if(r){
      const d=JSON.parse(r);
      return{ck:d.ck||{},notes:d.notes||{},tnotes:d.tnotes||{},st:d.st||{},cd:d.cd||{},ca:d.ca||{}};
    }
  }catch(e){}
  // First time: use pre-filled meeting data
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

// Actions
function toggle(id){document.getElementById(id).classList.toggle("collapsed")}
function expandAll(){document.querySelectorAll(".topic.collapsed").forEach(t=>t.classList.remove("collapsed"))}
function collapseAll(){document.querySelectorAll(".topic").forEach(t=>t.classList.add("collapsed"))}

function ckItem(id,v){S.ck[id]=v;save();render()}
function setSt(tid,s){S.st[tid]=S.st[tid]===s?'':s;save();render()}
function setCd(id,v){S.cd[id]=S.cd[id]===v?'':v;save();render()}
function setCa(id,v){S.ca[id]=S.ca[id]===v?'':v;save();render()}

function toggleItemNote(id){
  const el=document.getElementById("ni-"+id);
  el.classList.toggle("show");
  if(el.classList.contains("show"))el.querySelector("textarea").focus();
}
function saveItemNote(id,v){
  S.notes[id]=v;save();
  const btn=document.querySelector(`#b-${id} .note-btn`);
  if(btn){btn.className="note-btn"+(v?" has-note":"");btn.textContent=v?"筆記":"+ 備註"}
  let nd=document.getElementById("nd-"+id);
  if(v){if(!nd){nd=document.createElement("div");nd.id="nd-"+id;nd.className="note-display";document.getElementById("ni-"+id).parentElement.appendChild(nd)}nd.textContent=v}
  else if(nd){nd.remove()}
}

function toggleTNote(tid){
  const el=document.getElementById("tn-"+tid);
  el.classList.toggle("show");
  if(el.classList.contains("show"))el.querySelector("textarea").focus();
}
function saveTNote(tid,v){
  S.tnotes[tid]=v;save();
  const wrap=document.getElementById("tn-"+tid).parentElement;
  let pv=wrap.querySelector(".tn-preview");
  if(v){if(!pv){pv=document.createElement("div");pv.className="tn-preview";wrap.appendChild(pv)}pv.textContent=v}
  else if(pv){pv.remove()}
  wrap.querySelector(".tn-toggle").textContent=v?'編輯本題筆記':'+ 本題綜合筆記';
}

function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}

  r += "========================================================\n";
  r += `會議日期：2026/03/18（三）下午 03:08\n`;
  r += `確認進度：${doneN} / ${allItems.length} 項完成\n`;
  r += `報告產出：${now.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"})} ${now.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})}\n`;
  r += "--------------------------------------------------------\n\n";

  topics.forEach((t,ti)=>{
    const st=S.st[t.id];
    const stTag=st==='ok'?' [OK]':st==='pend'?' [待補]':st==='disc'?' [再議]':'';
    r+=`【${ti+1}】${t.title}${stTag}\n`;

    t.groups.forEach(g=>{
      if(g.label) r+=`\n  ◆ ${g.label}\n`;
      g.items.forEach(item=>{
        const ck=S.ck[item.id]?"V":" ";
        r+=`  [${ck}] ${item.text}\n`;
        if(S.notes[item.id]) r+=`      → ${S.notes[item.id].replace(/\n/g,"\n      → ")}\n`;
      });
    });

    if(t.isCert){
      r+="\n  ◆ 認證決議\n";
      r+=`    ${"認證".padEnd(18)}${"決議".padEnd(10)}申請方\n`;
      r+=`    ${"-".repeat(45)}\n`;
      certDecs.forEach((cd,ci)=>{
        const d=S.cd[cd.id];
        const dLabel=d==='go'?'GO':d==='hold'?'HOLD':d==='no'?'NO-GO':'未定';
        const ca=S.ca[certData[ci]?.cid]||"";
        const caLabel=ca==='df'?'大豐申請':ca==='ch'?'長虹申請':ca==='both'?'共同申請':'未定';
        r+=`    ${cd.name}：${dLabel}　｜　${caLabel}\n`;
      });
    }

    if(S.tnotes[t.id]){
      r+=`\n  ◆ 綜合紀錄\n  ${S.tnotes[t.id].replace(/\n/g,"\n  ")}\n`;
    }
    r+="\n";
  });

  // Pending items
  r+="========================================================\n";
  r+="  待辦追蹤\n";
  r+="========================================================\n\n";

  let hasPending=false;
  topics.forEach((t,ti)=>{
    const pending=t.groups.flatMap(g=>g.items).filter(i=>!S.ck[i.id]);
    if(pending.length){
      if(!hasPending){hasPending=true}
      r+=`【${ti+1}】${t.title}\n`;
      pending.forEach(i=>{
        r+=`  [ ] ${i.text}\n`;
        if(S.notes[i.id]) r+=`      → ${S.notes[i.id].replace(/\n/g,"\n      → ")}\n`;
      });
      r+="\n";
    }
  });
  if(!hasPending) r+="  全部項目已確認！\n\n";

  r+="--------------------------------------------------------\n";
  r+="以上為會議系統自動產出，請各與會者確認內容。\n";

  return r;
}

function showExport(){
  document.getElementById("reportContent").textContent = genReport();
  document.getElementById("modalOverlay").classList.add("show");
}
function closeModal(){
  document.getElementById("modalOverlay").classList.remove("show");
}
function copyReport(){
  navigator.clipboard.writeText(genReport()).then(()=>{
    const btn=document.querySelector(".modal-footer button:nth-child(2)");
    btn.textContent="已複製！";setTimeout(()=>btn.textContent="複製到剪貼簿",1500);
  });
}
function downloadReport(){
  const blob=new Blob([genReport()],{type:"text/plain;charset=utf-8"});
  const u=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=u;a.download=`大豐x長虹_會議紀錄_2026-03-18.txt`;
  a.click();URL.revokeObjectURL(u);
}

function saveBackup(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json;charset=utf-8"});
  const u=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=u;a.download=`會議紀錄備份_260318_${new Date().toISOString().slice(0,16).replace(/[T:]/g,'-')}.json`;
  a.click();URL.revokeObjectURL(u);
  const btns=document.querySelectorAll('.header-actions button');
  btns[2].textContent="已儲存！";setTimeout(()=>btns[2].textContent="儲存備份",1500);
}

function loadBackup(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(data.ck!==undefined){
        S={ck:data.ck||{},notes:data.notes||{},tnotes:data.tnotes||{},st:data.st||{},cd:data.cd||{},ca:data.ca||{}};
        save();render();
        alert("備份載入成功！共恢復 "+Object.keys(S.ck).filter(k=>S.ck[k]).length+" 項勾選、"+Object.keys(S.notes).filter(k=>S.notes[k]).length+" 則項目備註、"+Object.keys(S.tnotes).filter(k=>S.tnotes[k]).length+" 則議題筆記。");
      }else{
        alert("檔案格式不正確，請選擇正確的備份檔。");
      }
    }catch(err){
      alert("檔案讀取失敗："+err.message);
    }
  };
  reader.readAsText(file);
  e.target.value="";
}

function clearAll(){
  if(confirm("確定清除？")){localStorage.removeItem(SK);S=JSON.parse(JSON.stringify(DEFAULT_STATE));render()}
}

render();
</script>
